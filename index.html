<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FairwayBook - Enter the Course</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB; /* Fallback sky color */
            touch-action: none; /* Prevent browser scrolling/pull-to-refresh */
            font-family: 'Georgia', serif;
        }
        #canvas-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }
        #ui-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out, background-color 1s ease;
        }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Custom animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.8); }
        }
        .btn-glow { animation: pulse-glow 2s infinite; }

        /* Crosshair/Target hint */
        #aim-hint {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 5;
        }
    </style>
</head>
<body>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>
    
    <!-- Gameplay Hint -->
    <div id="aim-hint" class="font-sans uppercase font-bold text-sm tracking-widest text-white/70">
        Tilt or Drag to Steer
    </div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="bg-black/40 backdrop-blur-sm">
        
        <!-- Intro Screen -->
        <div id="intro-screen" class="pointer-events-auto text-center p-10 bg-white/10 rounded-3xl border border-white/20 shadow-2xl backdrop-blur-md max-w-lg mx-4">
            <div class="mb-2 text-green-400 font-sans font-bold tracking-widest uppercase text-sm animate-float">Welcome to</div>
            <h1 class="text-5xl md:text-6xl text-white mb-6 drop-shadow-xl font-bold">FairwayBook</h1>
            <p class="text-white/90 mb-8 text-lg md:text-xl font-sans font-light leading-relaxed">
                Tilt your phone <strong>or drag your finger</strong> to steer the ball into the hole.
                <span class="block text-sm opacity-70 mt-2">(Desktop users: Use your mouse)</span>
            </p>
            <button id="start-btn" class="bg-green-600 hover:bg-green-500 text-white font-sans font-bold py-4 px-12 rounded-full text-xl transition-all transform hover:scale-105 btn-glow">
                Tee Off
            </button>
        </div>

        <!-- Success Screen (Hidden Initially) -->
        <div id="success-screen" class="hidden text-center scale-90 opacity-0 transition-all duration-700 transform">
            <h2 class="text-6xl md:text-8xl text-white mb-4 drop-shadow-[0_4px_20px_rgba(0,0,0,0.5)] font-bold">Perfect!</h2>
            <p class="text-white text-2xl font-sans animate-pulse">Entering FairwayBook...</p>
        </div>
        
    </div>

    <script>
        // --- 3D Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Beautiful sunset/sunrise sky color (BotW style)
        scene.background = new THREE.Color('#9cd3f0');
        scene.fog = new THREE.FogExp2('#9cd3f0', 0.012); // Slightly pushed back fog for grander skyline

        // Camera setup (simulating the eye right behind the ball)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.75); // Brighter, softer base light
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfff4e5, 1.1); // Warm, bright sunlight
        dirLight.position.set(-15, 20, -10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 150;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        // --- The Sun ---
        // Placed in the exact same direction as the directional light, pushed far out into the skybox
        const sunGeo = new THREE.SphereGeometry(12, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff9eb }); // Pure unlit color so it glows brightly
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(-75, 100, -50); 
        scene.add(sun);

        // --- Ambient Clouds ---
        const clouds = [];
        function createCloud(x, y, z, scale) {
            const group = new THREE.Group();
            const cloudMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                flatShading: true, 
                roughness: 1.0,
                emissive: 0x222222 // Gives them a slight self-illumination so they don't look overly grey underneath
            });
            
            // Build fluffy cloud from overlapping spheres
            const c1 = new THREE.Mesh(new THREE.SphereGeometry(3 * scale, 16, 16), cloudMat);
            const c2 = new THREE.Mesh(new THREE.SphereGeometry(2 * scale, 16, 16), cloudMat);
            c2.position.set(3 * scale, -0.5 * scale, 1 * scale);
            const c3 = new THREE.Mesh(new THREE.SphereGeometry(2.5 * scale, 16, 16), cloudMat);
            c3.position.set(-3 * scale, -0.5 * scale, -1 * scale);
            const c4 = new THREE.Mesh(new THREE.SphereGeometry(1.8 * scale, 16, 16), cloudMat);
            c4.position.set(1.5 * scale, 1.5 * scale, -0.5 * scale);
            
            group.add(c1, c2, c3, c4);
            group.position.set(x, y, z);
            group.scale.set(1, 0.6, 1); // Flatten bottom slightly for a natural cloud look
            
            scene.add(group);
            clouds.push(group);
        }

        // Scatter some clouds high in the sky
        createCloud(-40, 45, -80, 2.0);
        createCloud(50, 55, -100, 3.0);
        createCloud(10, 40, -60, 1.5);
        createCloud(-80, 50, -40, 2.5);
        createCloud(70, 35, -30, 2.0);
        createCloud(-20, 60, -120, 4.0);

        // --- Environment Creation ---
        
        // Helper function for deterministic terrain height (BotW Rolling Hills)
        function getTerrainHeight(x, z) {
            if (Math.abs(x) <= 3) return 0; // Flat fairway down the middle
            let edgeDist = Math.abs(x) - 3;
            // Taper off the extreme heights in the distance so it doesn't spike to infinity
            if (edgeDist > 20) edgeDist = 20 + (edgeDist - 20) * 0.15; 
            
            // Rolling hills using sine/cosine for an organic, stylized look
            const noise = Math.sin(x * 1.2) * 0.2 + Math.cos(z * 0.6) * 0.2;
            return edgeDist * 0.4 + (noise * edgeDist);
        }
        
        // 1. The Fairway (Main Grass - Expanded for infinite skyline)
        const grassGeometry = new THREE.PlaneGeometry(300, 300, 128, 128); // Massive plane
        const grassMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x6dbf43, // Vibrant, stylized BotW green
            roughness: 1.0,
            metalness: 0.0,
            flatShading: true // Gives a painterly, low-poly vibe to the terrain
        });
        
        // Displace vertices deterministically
        const posAttribute = grassGeometry.attributes.position;
        for (let i = 0; i < posAttribute.count; i++) {
            const x = posAttribute.getX(i);
            const y = posAttribute.getY(i); // This acts as Z before rotation
            const height = getTerrainHeight(x, y);
            posAttribute.setZ(i, height); // Z becomes world Y after rotation
        }
        grassGeometry.computeVertexNormals();
        
        const grass = new THREE.Mesh(grassGeometry, grassMaterial);
        grass.rotation.x = -Math.PI / 2;
        grass.receiveShadow = true;
        scene.add(grass);

        // Distant Mountains for BotW Skyline (Rounded Hills)
        function createMountain(x, z, scale) {
            const group = new THREE.Group();
            const mountMat = new THREE.MeshStandardMaterial({ color: 0x5a9e38, flatShading: true, roughness: 1.0 });
            
            // Use squashed spheres to create organic, rounded rolling hills
            const mainHill = new THREE.Mesh(new THREE.SphereGeometry(18 * scale, 24, 16), mountMat);
            mainHill.scale.set(1, 0.45, 1); // Flatten vertically into a hill shape
            mainHill.position.set(0, 0, 0);
            
            const sideHill = new THREE.Mesh(new THREE.SphereGeometry(12 * scale, 24, 16), mountMat);
            sideHill.scale.set(1, 0.4, 1);
            sideHill.position.set(10 * scale, -2 * scale, 5 * scale);
            
            group.add(mainHill, sideHill);
            
            // Bury the bottom halves so they rise naturally from the horizon
            group.position.set(x, -3 * scale, z); 
            group.rotation.y = Math.random() * Math.PI;
            scene.add(group);
        }
        
        // Place rolling hills way in the back
        createMountain(-60, -110, 2.5);
        createMountain(70, -130, 3.2);
        createMountain(-25, -150, 4.0);
        createMountain(40, -160, 2.8);
        createMountain(-90, -90, 2.0);
        createMountain(90, -100, 2.2);

        // 2. The Hole
        const holeRadius = 0.3;
        const holeGeometry = new THREE.CircleGeometry(holeRadius, 32);
        const holeMaterial = new THREE.MeshBasicMaterial({ color: 0x111111, depthWrite: false });
        const hole = new THREE.Mesh(holeGeometry, holeMaterial);
        hole.rotation.x = -Math.PI / 2;
        hole.position.set(0, 0.01, -45); // Extended to 45 units ahead
        scene.add(hole);

        // 3. The Flag
        const poleGeometry = new THREE.CylinderGeometry(0.02, 0.02, 3);
        const poleMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
        const pole = new THREE.Mesh(poleGeometry, poleMaterial);
        pole.position.set(0, 1.5, -45.2);
        pole.castShadow = true;
        scene.add(pole);

        const flagGeometry = new THREE.PlaneGeometry(0.8, 0.5);
        const flagMaterial = new THREE.MeshStandardMaterial({ color: 0xef4444, side: THREE.DoubleSide });
        const flag = new THREE.Mesh(flagGeometry, flagMaterial);
        flag.position.set(0.4, 2.7, -45.2);
        flag.castShadow = true;
        scene.add(flag);

        // Decorative Trees (Stylized BotW aesthetic)
        function createTree(x, z) {
            const terrainY = getTerrainHeight(x, z);

            // Lengthen the trunk and bury it deeper to prevent floating on uneven low-poly interpolation
            const trunkGeo = new THREE.CylinderGeometry(0.15, 0.25, 2.5, 5);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6e5233, flatShading: true });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, terrainY + 0.1, z); // Center is low, burying the bottom 1.15 units deep
            trunk.castShadow = true;

            // Fluffy, chunky leaves using overlapping dodecahedrons
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x4a9632, flatShading: true });
            
            const leaves1 = new THREE.Mesh(new THREE.DodecahedronGeometry(1.2, 0), leavesMat);
            leaves1.position.set(x, terrainY + 1.8, z);
            leaves1.castShadow = true;

            const leaves2 = new THREE.Mesh(new THREE.DodecahedronGeometry(0.8, 0), leavesMat);
            leaves2.position.set(x + 0.6, terrainY + 1.4, z + 0.4);
            leaves2.castShadow = true;

            const leaves3 = new THREE.Mesh(new THREE.DodecahedronGeometry(0.7, 0), leavesMat);
            leaves3.position.set(x - 0.5, terrainY + 1.5, z - 0.3);
            leaves3.castShadow = true;

            scene.add(trunk);
            scene.add(leaves1);
            scene.add(leaves2);
            scene.add(leaves3);
        }

        // Add trees along the sides, extended deep into the horizon
        for(let i=0; i<100; i++) {
            createTree(
                (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 45), 
                -Math.random() * 140 + 5
            );
        }

        // --- High-Fidelity Goodyear-Style Blimp ---
        const blimpGroup = new THREE.Group();
        const mainBlimpContainer = new THREE.Group(); // Wrapper to scale and position
        
        // 1. Blimp Body Canvas (Wrap around texture)
        const blimpBodyCanvas = document.createElement('canvas');
        blimpBodyCanvas.width = 2048;
        blimpBodyCanvas.height = 1024;
        const bbCtx = blimpBodyCanvas.getContext('2d');
        bbCtx.fillStyle = '#e5e7eb'; // Silver-white base
        bbCtx.fillRect(0, 0, 2048, 1024);
        
        // Draw text on the true lateral sides of the blimp
        bbCtx.fillStyle = '#1e3a8a'; // Dark Blue font so it pops
        bbCtx.font = 'bold 240px "Georgia", serif';
        bbCtx.textAlign = 'center';
        bbCtx.textBaseline = 'middle';
        
        bbCtx.save();
        // Squeeze the text horizontally so it looks normal when stretched 2.5x on the 3D sphere
        bbCtx.scale(0.4, 1);
        
        // ThreeJS SphereGeometry maps U=0.25 (Canvas X=512) to the +Z face (left/port side)
        bbCtx.fillText("HOWLAND", 512 / 0.4, 512); 

        // ThreeJS SphereGeometry maps U=0.75 (Canvas X=1536) to the -Z face (right/starboard side)
        bbCtx.fillText("PUMP", 1536 / 0.4, 512); 
        bbCtx.restore();

        const blimpBodyTex = new THREE.CanvasTexture(blimpBodyCanvas);
        blimpBodyTex.anisotropy = 16;
        
        // 2. Banner Canvas
        const bannerCanvas = document.createElement('canvas');
        bannerCanvas.width = 1200;
        bannerCanvas.height = 160;
        const bCtx = bannerCanvas.getContext('2d');
        bCtx.fillStyle = '#ffffff';
        bCtx.fillRect(0, 0, bannerCanvas.width, bannerCanvas.height);
        bCtx.fillStyle = '#c26b00'; // Dark Bitcoin Orange
        bCtx.font = 'bold 80px "Georgia", serif';
        bCtx.textAlign = 'center';
        bCtx.textBaseline = 'middle';
        bCtx.fillText("C4: TECHNOLOGIES", bannerCanvas.width/2, bannerCanvas.height/2);
        
        const bannerTex = new THREE.CanvasTexture(bannerCanvas);
        bannerTex.anisotropy = 16;

        // 3. Blimp Mesh Assembly
        const blimpGeo = new THREE.SphereGeometry(1.5, 64, 32); // High polygon count
        const blimpMat = new THREE.MeshStandardMaterial({ 
            map: blimpBodyTex, 
            roughness: 0.35, 
            metalness: 0.2 
        });
        const blimpBody = new THREE.Mesh(blimpGeo, blimpMat);
        blimpBody.scale.set(2.5, 1, 1); // Elongate
        blimpGroup.add(blimpBody);

        // Cabin
        const cabin = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.4, 0.4), 
            new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 })
        );
        cabin.position.set(0, -1.2, 0);
        blimpGroup.add(cabin);
        
        // Engine Pods
        const engineGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.5, 16);
        const engineMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 });
        const engineL = new THREE.Mesh(engineGeo, engineMat);
        engineL.rotation.z = Math.PI / 2; 
        engineL.position.set(-0.3, -1.1, 0.35);
        blimpGroup.add(engineL);
        const engineR = engineL.clone();
        engineR.position.set(-0.3, -1.1, -0.35);
        blimpGroup.add(engineR);

        // Aerodynamic Fins
        const finMat = new THREE.MeshStandardMaterial({ color: 0x1d4ed8 }); // Corporate Blue
        const topFin = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.05), finMat);
        topFin.position.set(-3.2, 0.8, 0);
        const bottomFin = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.05), finMat);
        bottomFin.position.set(-3.2, -0.8, 0);
        const sideFinL = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 1.2), finMat);
        sideFinL.position.set(-3.2, 0, 0.8);
        const sideFinR = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 1.2), finMat);
        sideFinR.position.set(-3.2, 0, -0.8);
        blimpGroup.add(topFin, bottomFin, sideFinL, sideFinR);

        // Blinking Aviation Beacon
        const beaconMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true });
        const beaconLight = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), beaconMat);
        beaconLight.position.set(0, -1.5, 0);
        blimpGroup.add(beaconLight);

        // Banner Mesh (Double-sided with flipped UVs for 360-degree legibility)
        const bannerWidth = 12;
        const bannerGeo = new THREE.PlaneGeometry(bannerWidth, 1.4, 32, 4);
        
        // Front face
        const bannerMatFront = new THREE.MeshBasicMaterial({ map: bannerTex, side: THREE.FrontSide });
        const bannerFront = new THREE.Mesh(bannerGeo, bannerMatFront);

        // Back face (Flipped UVs)
        const bannerGeoBack = bannerGeo.clone();
        const uvs = bannerGeoBack.attributes.uv;
        for (let i = 0; i < uvs.count; i++) {
            uvs.setX(i, 1 - uvs.getX(i)); // Flip horizontally
        }
        // Share the position attribute so animating bannerGeo automatically animates bannerGeoBack!
        bannerGeoBack.setAttribute('position', bannerGeo.getAttribute('position'));
        
        const bannerMatBack = new THREE.MeshBasicMaterial({ map: bannerTex, side: THREE.BackSide });
        const bannerBack = new THREE.Mesh(bannerGeoBack, bannerMatBack);

        const bannerGroup = new THREE.Group();
        bannerGroup.add(bannerFront, bannerBack);
        bannerGroup.position.set(-9.5, 0, 0); // Trail directly behind the blimp's nose
        blimpGroup.add(bannerGroup);

        // Tow lines
        const lineMat = new THREE.LineBasicMaterial({ color: 0x222222 });
        const lineGeo1 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-3.8, 0, 0), new THREE.Vector3(-4.8, 0.7, 0)]);
        const lineGeo2 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-3.8, 0, 0), new THREE.Vector3(-4.8, -0.7, 0)]);
        blimpGroup.add(new THREE.Line(lineGeo1, lineMat), new THREE.Line(lineGeo2, lineMat));

        mainBlimpContainer.add(blimpGroup);
        mainBlimpContainer.scale.set(1.4, 1.4, 1.4); // Scale up for maximum visibility
        scene.add(mainBlimpContainer);

        // --- Milestone Markers ---
        const milestones = [];

        // Helper: Generate Canvas Texture for Text
        function createTextTexture(text, style) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            if (style === 'holo') {
                ctx.fillStyle = 'rgba(0, 15, 30, 0.85)'; // Darker, opaque background for legibility
                ctx.fillRect(0,0, canvas.width, canvas.height);
                
                // Add a glowing border
                ctx.strokeStyle = '#00e5ff';
                ctx.lineWidth = 6;
                ctx.strokeRect(3, 3, canvas.width-6, canvas.height-6);

                ctx.fillStyle = '#ffffff'; // White text for maximum contrast
                ctx.shadowColor = '#00e5ff'; // Cyan glow
                ctx.shadowBlur = 15;
            } else {
                // Gold or Silver Gradient
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                if (style === 'gold') {
                    grad.addColorStop(0, '#d4af37');
                    grad.addColorStop(0.5, '#fff7d6');
                    grad.addColorStop(1, '#aa7c11');
                } else if (style === 'silver') {
                    grad.addColorStop(0, '#8e9eab');
                    grad.addColorStop(0.5, '#ffffff');
                    grad.addColorStop(1, '#8e9eab');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(0,0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#111111'; // Dark text
                ctx.shadowColor = 'rgba(255,255,255,0.8)';
                ctx.shadowBlur = 4;
            }
            
            ctx.font = 'bold 28px "Georgia", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const lines = text.split('\n');
            const lineHeight = 36;
            const startY = (canvas.height - (lines.length * lineHeight)) / 2 + 18;
            lines.forEach((line, i) => {
                ctx.fillText(line, canvas.width/2, startY + (i * lineHeight));
            });
            
            return new THREE.CanvasTexture(canvas);
        }

        // 1. First Milestone: Flag
        function createFlagMilestone(x, z, text, style) {
            const group = new THREE.Group();
            const terrainY = getTerrainHeight(x, z);
            group.position.set(x, terrainY - 4, z); // Start buried

            const poleColor = style === 'gold' ? 0xd4af37 : 0xaaaaaa;
            const mPole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, 3), 
                new THREE.MeshStandardMaterial({ color: poleColor, metalness: 0.9, roughness: 0.1 })
            );
            mPole.position.y = 1.5;
            mPole.castShadow = true;
            group.add(mPole);

            // Flag needs segments to wave
            const flagWidth = 1.8;
            const mFlagGeo = new THREE.PlaneGeometry(flagWidth, 1.2, 16, 8);
            const mFlagMat = new THREE.MeshStandardMaterial({ 
                map: createTextTexture(text, style), 
                side: THREE.DoubleSide,
                roughness: 0.3,
                metalness: 0.6 // Gives the fabric a beautiful metallic sheen
            });
            const mFlag = new THREE.Mesh(mFlagGeo, mFlagMat);
            mFlag.position.set(flagWidth/2, 2.4, 0); // Attach to pole
            mFlag.castShadow = true;
            group.add(mFlag);

            scene.add(group);

            milestones.push({
                z: z,
                triggered: false,
                targetY: terrainY,
                group: group,
                update: (time) => {
                    // Wind wave effect
                    const pos = mFlagGeo.attributes.position;
                    for (let i = 0; i < pos.count; i++) {
                        const vx = pos.getX(i);
                        // Anchor left side to pole, wave the rest
                        const normalizedX = (vx + flagWidth/2) / flagWidth; 
                        const wave = Math.sin(normalizedX * 6 - time * 5) * 0.2 * normalizedX;
                        pos.setZ(i, wave);
                    }
                    pos.needsUpdate = true;
                }
            });
        }

        // 2. Second Milestone: Hologram
        function createHoloMilestone(x, z, text) {
            const group = new THREE.Group();
            const terrainY = getTerrainHeight(x, z);
            group.position.set(x, terrainY - 4, z); // Start buried

            // Projector Base
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            base.position.y = 0.15;
            group.add(base);

            // Glowing Projector Light
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
            const beam = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3, 16, 1, true), glowMat);
            beam.position.y = 1.5;
            beam.rotation.x = Math.PI; // Flip cone upside down
            group.add(beam);

            // Holo Animation Group (Club + Ball)
            const holoAnimGroup = new THREE.Group();
            
            // Core solid material + Glowing wireframe for that distinct sci-fi hologram look
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x002244, transparent: true, opacity: 0.9 });
            const wireMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.8 });
            
            function createHoloPart(geometry, pos, rotZ, parent) {
                const mesh = new THREE.Mesh(geometry, coreMat);
                const wire = new THREE.Mesh(geometry, wireMat);
                mesh.add(wire); 
                if (pos) mesh.position.copy(pos);
                if (rotZ) mesh.rotation.z = rotZ;
                if (parent) parent.add(mesh);
                return { mesh, wire };
            }

            // Club Pivot (acts like the golfer's hands at the top of the shaft)
            const clubPivot = new THREE.Group();
            clubPivot.position.set(0, 1.4, 0);
            
            // Shaft and Head attached to the pivot
            createHoloPart(new THREE.CylinderGeometry(0.015, 0.015, 1.0, 4), new THREE.Vector3(0, -0.5, 0), 0, clubPivot);
            createHoloPart(new THREE.BoxGeometry(0.12, 0.08, 0.05), new THREE.Vector3(0.04, -1.0, 0), 0, clubPivot);
            
            holoAnimGroup.add(clubPivot);

            // Holo Ball (needs its own cloned materials so it can fade out independently of the club)
            const ballCoreMat = coreMat.clone();
            const ballWireMat = wireMat.clone();
            const holoBall = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), ballCoreMat);
            const holoBallWire = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), ballWireMat);
            holoBall.add(holoBallWire);
            holoBall.position.set(0, 0.35, 0); // Ground level of holo projector
            holoAnimGroup.add(holoBall);

            holoAnimGroup.position.y = 0.5;
            group.add(holoAnimGroup);

            // Holo Text
            const textPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(3.5, 1.75), // Slightly larger
                new THREE.MeshBasicMaterial({ 
                    map: createTextTexture(text, 'holo'), 
                    transparent: true, 
                    opacity: 0.95, 
                    depthWrite: false 
                }) // Removed AdditiveBlending so the dark background blocks the bright sky
            );
            textPlane.position.set(0, 3, 0);
            group.add(textPlane);

            scene.add(group);

            milestones.push({
                z: z,
                triggered: false,
                targetY: terrainY,
                group: group,
                update: (time) => {
                    // Floating effect
                    holoAnimGroup.position.y = 0.5 + Math.sin(time * 2) * 0.1;
                    textPlane.position.y = 3 + Math.sin(time * 2 + 1) * 0.1;
                    
                    // --- Swing Animation Logic ---
                    const phase = (time * 1.2) % 2.0; // 2 second animation loop
                    let clubAngle = 0;
                    let ballX = 0;
                    let ballOpacity = 1;

                    if (phase < 1.0) {
                        // Slow Backswing
                        clubAngle = phase * 1.5; 
                    } else if (phase < 1.1) {
                        // Fast Downswing
                        clubAngle = 1.5 - (phase - 1.0) * 10 * 3.0; // Moves rapidly from 1.5 to -1.5
                    } else {
                        // Follow through & gentle reset
                        clubAngle = -1.5 + (phase - 1.1) * (1.5 / 0.9); // Moves back to 0
                    }

                    // --- Ball Hit Logic ---
                    if (phase > 1.05 && phase < 1.5) {
                        // Ball flies right immediately after club hits bottom arc
                        ballX = (phase - 1.05) * 8;
                        ballOpacity = 1 - (phase - 1.05) * 2.2; // Fade out rapidly as it flies
                    } else if (phase >= 1.5) {
                        ballOpacity = 0; // Keep hidden until next swing begins
                    }

                    // Apply animations
                    clubPivot.rotation.z = clubAngle;
                    holoBall.position.x = ballX;
                    
                    // --- Aesthetic Flicker ---
                    const flicker = 0.8 + Math.random() * 0.2; 
                    coreMat.opacity = flicker * 0.9;
                    wireMat.opacity = flicker * 0.8;
                    
                    // Apply flickers and ball fades to the independent ball materials
                    ballCoreMat.opacity = flicker * ballOpacity * 0.9;
                    ballWireMat.opacity = flicker * ballOpacity * 0.8;

                    glowMat.opacity = flicker * 0.2;
                    textPlane.material.opacity = flicker * 0.95;
                    group.rotation.y = Math.sin(time * 0.5) * 0.2; // Slowly face user
                }
            });
        }

        // Initialize Milestones
        createFlagMilestone(-3, -10, "C4: TECHNOLOGIES\nEST 2025", 'gold');
        createHoloMilestone(3, -20, "PGA Professional Player\nKevin Maginn\nNeeded better TEE TIME solutions.\nMarch 2026");
        createFlagMilestone(-3, -32, "Partridge Run Golf Course\nSigns up as the 1st Customer\nMarch 2026", 'silver');


        // 4. The Golf Ball
        const ballRadius = 0.08;
        const ballGeometry = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            roughness: 0.3, 
            metalness: 0.1 
        });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.position.set(0, ballRadius, 0);
        ball.castShadow = true;
        scene.add(ball);

        // --- Game Logic & Physics ---
        let isPlaying = false;
        let isWon = false;
        let velocity = new THREE.Vector3(0, 0, 0);
        let targetVelocityX = 0;
        let targetVelocityZ = -0.05; // Constant forward baseline once started
        
        // Sensor calibration bases
        let baseGamma = null;
        let baseBeta = null;
        let useMouseFallback = true;
        let isDragging = false; // Prevents touch and gyro from fighting each other
        let mouseX = 0;
        let mouseY = 0;

        // --- Audio System (Web Audio API) ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playApplause() {
            if (!audioCtx) return;
            
            const bufferSize = audioCtx.sampleRate * 3; // 3 seconds of audio
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            // Generate white noise with randomized volume spikes to simulate individual claps
            for (let i = 0; i < bufferSize; i++) {
                let noise = Math.random() * 2 - 1;
                if (Math.random() < 0.005) { // 0.5% chance of a loud clap peak
                    noise *= 4;
                }
                data[i] = noise;
            }
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            
            // Bandpass filter muffles the noise to human clapping frequencies (~1000Hz)
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1000; 
            filter.Q.value = 0.5;
            
            // Gain node controls the volume envelope (fade in, hold, fade out)
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(1.5, audioCtx.currentTime + 0.1); // Quick fade in
            gainNode.gain.setValueAtTime(1.5, audioCtx.currentTime + 1.2); // Hold volume
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.5); // Fade out to 0 right before redirect
            
            // Connect nodes and play
            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            noiseSource.start();
        }

        // --- Input Handling ---

        function handleOrientation(event) {
            // Ignore gyro if the user is currently touching/dragging the screen
            if (isDragging || !isPlaying || isWon) return; 

            // Check for valid data and ensure it's not dead zeroes
            if (event.gamma !== null && event.beta !== null) {
                useMouseFallback = false;
                
                // Set baseline on first read
                if (baseGamma === null) {
                    baseGamma = event.gamma;
                    baseBeta = event.beta;
                }

                // Calculate tilt relative to the angle they held the phone when they hit "Start"
                let deltaGamma = event.gamma - baseGamma;
                let deltaBeta = event.beta - baseBeta;

                // Handle gimbal wrap-around gracefully
                if (deltaGamma > 90) deltaGamma -= 180;
                if (deltaGamma < -90) deltaGamma += 180;

                // Clamp to a 30-degree steering window for better sensitivity
                const maxTilt = 30;
                let steerX = Math.max(-maxTilt, Math.min(maxTilt, deltaGamma)) / maxTilt;
                let steerZ = Math.max(-maxTilt, Math.min(maxTilt, deltaBeta)) / maxTilt;

                // Map tilt to velocity
                targetVelocityX = steerX * 0.15; 
                targetVelocityZ = -0.05 + (steerZ * 0.1); 
            }
        }

        function handleMouseMove(event) {
            if (!useMouseFallback || isDragging) return;
            // Normalize mouse position to -1 to +1
            const nx = (event.clientX / window.innerWidth) * 2 - 1;
            const ny = (event.clientY / window.innerHeight) * 2 - 1;
            
            targetVelocityX = nx * 0.15;
            targetVelocityZ = -0.05 + (ny * 0.1); // Push mouse up to go faster
        }

        // --- Touch Fallback (Crucial for embedded environments) ---
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            if (!isPlaying || isWon) return;
            useMouseFallback = false;
            isDragging = true; // Flag touch as active to override gyro temporarily
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isPlaying || isWon) return;
            e.preventDefault(); // Prevent screen scroll

            const deltaX = e.touches[0].clientX - touchStartX;
            const deltaY = e.touches[0].clientY - touchStartY;

            const maxDrag = 100; // Pixels to reach max steer
            let steerX = Math.max(-1, Math.min(1, deltaX / maxDrag));
            let steerZ = Math.max(-1, Math.min(1, deltaY / maxDrag));

            targetVelocityX = steerX * 0.15;
            targetVelocityZ = -0.05 + (steerZ * 0.1);
        }, { passive: false });

        document.addEventListener('touchend', () => {
            if (!isPlaying || isWon) return;
            isDragging = false; // Allow gyro to take back over
            
            // Snap back to forward trajectory when finger is lifted
            targetVelocityX = 0;
            targetVelocityZ = -0.05;
        });

        // --- UI Interactions ---

        document.getElementById('start-btn').addEventListener('click', () => {
            // Initialize audio context on first user interaction to satisfy browser policies
            initAudio(); 

            const startSequence = () => {
                document.getElementById('ui-layer').style.backgroundColor = 'transparent';
                document.getElementById('ui-layer').style.backdropFilter = 'none';
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    document.getElementById('aim-hint').style.opacity = '1';
                    
                    // Fade out hint after 3 seconds
                    setTimeout(() => {
                        document.getElementById('aim-hint').style.opacity = '0';
                    }, 3000);

                    isPlaying = true;
                }, 500);

                // Start moving slightly
                velocity.z = -0.05;

                // Setup Listeners
                document.addEventListener('mousemove', handleMouseMove);
            };

            // Request DeviceOrientation permission for iOS 13+
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        } else {
                            console.warn("Sensor permission denied. Using touch fallback.");
                        }
                        startSequence();
                    })
                    .catch(err => {
                        console.error("Sensor error:", err);
                        startSequence();
                    });
            } else {
                // Non-iOS 13+ devices
                window.addEventListener('deviceorientation', handleOrientation);
                startSequence();
            }
        });

        // --- Win Sequence ---
        function triggerWin() {
            if (isWon) return;
            isWon = true;
            
            // Trigger strong haptic feedback for mobile devices (Plop! .. Ta-da!)
            if (typeof navigator !== 'undefined' && navigator.vibrate) {
                navigator.vibrate([150, 50, 300]); 
            }
            
            // Play Synthesized Audience Applause (Fades out automatically)
            playApplause();
            
            // Plop sound simulation (just visual)
            velocity.set(0, 0, 0);
            
            const uiLayer = document.getElementById('ui-layer');
            const successScreen = document.getElementById('success-screen');
            
            uiLayer.style.backgroundColor = 'rgba(0, 0, 0, 0.85)';
            uiLayer.style.backdropFilter = 'blur(10px)';
            successScreen.classList.remove('hidden');
            
            // Trigger animation classes
            setTimeout(() => {
                successScreen.classList.remove('opacity-0', 'scale-90');
                successScreen.classList.add('opacity-100', 'scale-100');
            }, 50);

            // Redirect to main site after sequence
            setTimeout(() => {
                window.location.href = "https://www.fairwaybook.com";
            }, 2500);
        }

        // --- Main Game Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // --- Cloud Animation ---
            clouds.forEach(cloud => {
                cloud.position.x += 0.01; // Gentle wind drift
                if (cloud.position.x > 150) {
                    cloud.position.x = -150; // Wrap around
                }
            });

            // --- High-Fidelity Blimp Animation (Slowed Down) ---
            // Keep the blimp strictly in center focus relative to the camera, slowed movement for readability
            const blimpTargetX = Math.sin(time * 0.12) * 16; // Slower wide sweeping figure-8
            const blimpTargetZ = camera.position.z - 45 + Math.cos(time * 0.18) * 6; // Always 45 units ahead!
            
            // Calculate velocity vector to dynamically rotate the blimp into the wind (also slowed)
            const bVx = Math.cos(time * 0.12) * 0.12 * 16;
            const bVz = -Math.sin(time * 0.18) * 0.18 * 6;
            
            mainBlimpContainer.position.x = blimpTargetX;
            mainBlimpContainer.position.z = blimpTargetZ;
            mainBlimpContainer.position.y = 18 + Math.sin(time * 0.4) * 1.5; // Majestic vertical bobbing
            
            // Rotate blimp to face flight direction perfectly
            mainBlimpContainer.rotation.y = -Math.atan2(bVz, bVx);

            // Strobe the aviation beacon
            beaconMat.opacity = (time % 1.5 < 0.2) ? 1 : 0.1;
            
            // Wave the high-fidelity banner (slowed wind effect to match slower blimp)
            const bPos = bannerGeo.attributes.position;
            for (let i = 0; i < bPos.count; i++) {
                const vx = bPos.getX(i);
                // The right side of the banner is attached to the blimp, left side waves freely
                const normalizedX = (bannerWidth / 2 - vx) / bannerWidth; 
                const wave = Math.sin(normalizedX * 14 - time * 6) * 0.35 * normalizedX;
                bPos.setZ(i, wave);
            }
            bPos.needsUpdate = true;

            if (isPlaying && !isWon) {
                // Smoothly interpolate current velocity toward target velocity (inertia/friction feel)
                velocity.x += (targetVelocityX - velocity.x) * 0.1;
                velocity.z += (targetVelocityZ - velocity.z) * 0.1;

                // Apply velocity to position
                ball.position.x += velocity.x;
                ball.position.z += velocity.z;

                // Simple boundaries to keep them on the grass
                if (ball.position.x > 8) ball.position.x = 8;
                if (ball.position.x < -8) ball.position.x = -8;
                if (ball.position.z > 3) { // Prevent rolling infinitely backwards off the course
                    ball.position.z = 3;
                    velocity.z = 0;
                }

                // Adjust ball height to match terrain elevation perfectly to prevent clipping
                ball.position.y = getTerrainHeight(ball.position.x, ball.position.z) + ballRadius;

                // --- Update Milestones ---
                milestones.forEach(m => {
                    // Trigger pop-up when ball gets within 8 units
                    if (!m.triggered && ball.position.z < m.z + 8) {
                        m.triggered = true;
                    }
                    if (m.triggered) {
                        // Smoothly rise from the ground
                        m.group.position.y += (m.targetY - m.group.position.y) * 0.05;
                    }
                    // Run custom animations (wind, floating)
                    m.update(time);
                });

                // Add slight rolling visual (rotating the ball based on distance moved)
                const distanceMoved = Math.sqrt(velocity.x**2 + velocity.z**2);
                ball.rotation.x -= velocity.z / ballRadius;
                ball.rotation.z += velocity.x / ballRadius;

                // Check collision with hole
                const distToHole = Math.sqrt(
                    Math.pow(ball.position.x - hole.position.x, 2) + 
                    Math.pow(ball.position.z - hole.position.z, 2)
                );

                if (distToHole < holeRadius) {
                    triggerWin();
                }

                // If user misses and goes way past the hole, reset them gently
                if (ball.position.z < -55) {
                    ball.position.set(0, ballRadius, 0);
                    velocity.set(0,0,0);
                    targetVelocityX = 0;
                    targetVelocityZ = -0.05;
                    
                    // Reset milestones on game reset
                    milestones.forEach(m => { 
                        m.triggered = false; 
                        m.group.position.y = m.targetY - 4; // Bury them again
                    });
                }
            }

            // Win Animation: Ball drops into hole
            if (isWon) {
                if (ball.position.y > -0.2) {
                    ball.position.y -= 0.02; // Drop down
                    ball.position.x += (hole.position.x - ball.position.x) * 0.1; // Center it
                    ball.position.z += (hole.position.z - ball.position.z) * 0.1;
                }
            }

            // Camera Tracking: "Eye behind the ball"
            // Camera stays slightly behind and slightly above the ball, looking forward.
            const cameraFollowSpeed = 0.15;
            const targetCameraX = ball.position.x;
            const targetCameraY = ball.position.y + 0.3; // Low to the ground
            const targetCameraZ = ball.position.z + 1.2; // Behind the ball

            camera.position.x += (targetCameraX - camera.position.x) * cameraFollowSpeed;
            camera.position.y += (targetCameraY - camera.position.y) * cameraFollowSpeed;
            camera.position.z += (targetCameraZ - camera.position.z) * cameraFollowSpeed;

            // Look slightly ahead of the ball, towards the hole
            camera.lookAt(ball.position.x, 0, ball.position.z - 5);

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();
    </script>
</body>
</html>
